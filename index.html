<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Pizza — Order Online</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --crust:#1A1208;
  --tomato:#C8321A;
  --cream:#FDF6EC;
  --muted:#7A6A55;
  --white:#FFFFFF;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:var(--cream);
  color:var(--crust);
  font-family:'Inter',sans-serif;
}

/* NAVBAR */

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 50px;
  background:rgba(253,246,236,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(200,50,26,.08);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:1.8rem;
  font-weight:900;
  color:var(--tomato);
}

.logo span{
  color:var(--crust);
}

/* HERO */

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 24px;
}

.hero-content{
  max-width:760px;
}

.hero-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(200,50,26,.08);
  color:var(--tomato);
  padding:8px 16px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:24px;
}

.hero-eyebrow::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--tomato);
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(3rem,6vw,5rem);
  line-height:1.05;
  margin-bottom:24px;
  letter-spacing:-1px;
}

.hero h1 em{
  color:var(--tomato);
  font-style:italic;
}

.hero-sub{
  color:var(--muted);
  font-size:1.15rem;
  line-height:1.8;
  max-width:650px;
  margin:auto;
}

/* MOBILE */

@media(max-width:768px){

  html,
  body{
    overflow:auto;
  }

  nav{
    padding:18px 24px;
  }

  .hero{
    padding:120px 24px 60px;
  }

  .hero h1{
    font-size:3rem;
  }

  .hero-sub{
    font-size:1rem;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Park<span>Pizza</span></div>
</nav>

<section class="hero">
  <div class="hero-content">

    <div class="hero-eyebrow">
      Now Taking Orders Via AI
    </div>

    <h1>
      Great Pizza,<br>
      <em>Ordered Your Way</em>
    </h1>

    <p class="hero-sub">
      Chat with our AI ordering assistant to browse the menu,
      customize your order, and receive a payment link in seconds.
    </p>

  </div>
</section>

<!-- RETELL WIDGET -->

<script
  id="retell-widget"
  src="https://dashboard.retellai.com/retell-widget-v2.js"
  data-public-key="public_key_35163ac2f5fe6b1c44bee"
  data-agent-id="agent_128c4a5a69b348a97656589c1d"
  data-title="🍕 Order Here">
</script>

<!-- CUSTOMIZE BUTTON + AUTO OPEN -->

<script>
(function() {

  const observer = setInterval(() => {

    const buttons = document.querySelectorAll("button");

    buttons.forEach(btn => {

      const text = (btn.innerText || "").toLowerCase();

      if (
        text.includes("support") ||
        text.includes("need")
      ) {

        btn.innerHTML = "🍕 Order Here";

        btn.style.background = "#C8321A";
        btn.style.color = "#ffffff";
        btn.style.border = "none";
        btn.style.borderRadius = "999px";
        btn.style.padding = "14px 22px";
        btn.style.fontWeight = "600";
        btn.style.boxShadow = "0 8px 25px rgba(200,50,26,.35)";

        if (!window.retellAutoOpened) {

          window.retellAutoOpened = true;

          setTimeout(() => {
            btn.click();
          }, 1200);

        }
      }

    });

  }, 500);

})();
</script>

</body>
</html>
