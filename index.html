<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Pizza — Order Online</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --crust:#1A1208;
  --tomato:#C8321A;
  --cream:#FDF6EC;
  --muted:#7A6A55;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--cream);
  font-family:'Inter',sans-serif;
  color:var(--crust);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  background:rgba(253,246,236,0.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(200,50,26,0.1);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:1.6rem;
  font-weight:900;
  color:var(--tomato);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

.hero-content{
  max-width:750px;
}

.hero-eyebrow{
  display:inline-flex;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(200,50,26,0.08);
  color:var(--tomato);
  font-size:.75rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:20px;
}

.hero-eyebrow::before{
  content:"";
  width:8px;
  height:8px;
  background:var(--tomato);
  border-radius:50%;
  margin-right:8px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8rem,6vw,4.8rem);
  line-height:1.05;
  margin-bottom:20px;
}

.hero h1 em{
  color:var(--tomato);
}

.hero-sub{
  color:var(--muted);
  font-size:1.1rem;
  line-height:1.7;
}

/* MOBILE */
@media(max-width:768px){
  html,body{overflow:auto;}
  nav{padding:16px 20px;}
}
</style>
</head>

<body>

<nav>
  <div class="logo">Park<span>Pizza</span></div>
</nav>

<section class="hero">
  <div class="hero-content">

    <div class="hero-eyebrow">Now Taking Orders Via AI</div>

    <h1>
      Great Pizza,<br>
      <em>Ordered Your Way</em>
    </h1>

    <p class="hero-sub">
      Chat with our AI assistant to browse the menu, customize your order.
    </p>

  </div>
</section>

<!-- RETELL WIDGET -->
<script
  id="retell-widget"
  src="https://dashboard.retellai.com/retell-widget-v2.js"
  data-public-key="public_key_35163ac2f5fe6b1c44bee"
  data-agent-id="agent_128c4a5a69b348a97656589c1d"
  data-title="🍕 Order Now">
</script>

<!-- FIX + STYLE SHADOW DOM BUTTON -->
<script>
function applyRetellBranding() {

  document.querySelectorAll('div').forEach(host => {
    if (!host.shadowRoot) return;

    const root = host.shadowRoot;

    // ---------------------------
    // INJECT CSS INTO SHADOW DOM (overrides Retell's own styles)
    // ---------------------------
    if (!root.querySelector('style[data-park]')) {
      const style = document.createElement('style');
      style.setAttribute('data-park', '1');
      style.textContent = `
        button {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
        }
      `;
      root.appendChild(style);
    }

    const btn = root.querySelector('button');
    const text = root.querySelector('span');

    if (btn && text) {

      if (
        text.textContent.includes("Need support") ||
        text.textContent.includes("Support")
      ) {
        text.textContent = "🍕 Order Here";
      }

      // Re-apply red ONLY to the main Order Here button
      btn.style.setProperty('background', '#C8321A', 'important');
      btn.style.setProperty('color', '#fff', 'important');
      btn.style.fontWeight = "700";
      btn.style.fontFamily = "Inter, sans-serif";

      btn.onmouseenter = () => {
        btn.style.setProperty('box-shadow', '0 18px 55px rgba(200,50,26,0.5)', 'important');
      };
      btn.onmouseleave = () => {
        btn.style.setProperty('box-shadow', '0 12px 40px rgba(200,50,26,0.35)', 'important');
      };
    }

    // Status dot
    const statusDot =
      root.querySelector('[class*="status"]') ||
      root.querySelector('[class*="indicator"]') ||
      root.querySelector('svg + div');
    if (statusDot) statusDot.style.display = "none";

    // Chat window size
    const chatWindow =
      root.querySelector('div[role="dialog"]') ||
      root.querySelector('div');
    if (chatWindow) {
      chatWindow.style.maxHeight = "70vh";
      chatWindow.style.height = "70vh";
      chatWindow.style.width = "380px";
      chatWindow.style.borderRadius = "18px";
      chatWindow.style.overflow = "hidden";
    }
  });
}

// Run continuously (Retell resets UI on close/open)
setInterval(applyRetellBranding, 300);
</script>

<!-- AUTO OPEN WIDGET -->
<script>
window.addEventListener("load", () => {

  setTimeout(() => {

    document.querySelectorAll('div').forEach(host => {
      if (!host.shadowRoot) return;

      const root = host.shadowRoot;
      const btn = root.querySelector('button');

      if (btn) btn.click();

    });

  }, 1200);

});
</script>

</body>
</html>
